<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección de Vinilos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Vinyls</h1>

<div class="contenedor">
    <div class="disco">
        <img src="img/brent.jpg" alt="Brent Faiyaz">
        <p class="artista">Brent Faiyaz</p>
        <p class="album">Icon</p>
    </div>

    <div class="disco">
        <img src="img/party.jpg" alt="PARTYNEXTDOOR">
        <p class="artista">PARTYNEXTDOOR</p>
        <p class="album">PARTYNEXTDOOR</p>
    </div>

    <div class="disco">
        <img src="img/kanye.jpg" alt="Graduation">
        <p class="artista">Kanye West</p>
        <p class="album">Graduation</p>
    </div>

    <div class="disco">
        <img src="img/daniel.jpg" alt="Daniel Caesar">
        <p class="artista">Daniel Caesar</p>
        <p class="album">Praise Break</p>
    </div>

    <div class="disco">
        <img src="img/drake.png" alt="CLB">
        <p class="artista">Drake</p>
        <p class="album">Certified Lover Boy</p>
    </div>

    <div class="disco">
        <img src="img/childgamb.jpg" alt="Childish Gambino">
        <p class="artista">Childish Gambino</p>
        <p class="album">Because the Internet</p>
    </div>
</div>

</body>
</html>
